<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>New diagnosis · Medical Records</title>
    <th:block th:replace="~{fragments/layout :: head-links}"></th:block>
</head>
<body>
<header th:replace="~{fragments/layout :: header}"></header>

<main class="container">
    <div class="page-header">
        <div>
            <h1>New diagnosis</h1>
            <p>Add a code and clinical title.</p>
        </div>
        <a class="btn btn--ghost" th:href="@{/diagnoses}">Cancel</a>
    </div>

    <div class="card">
        <div class="api-error" data-api-error role="alert"></div>

        <form id="diagnosis-create-form"
              data-method="POST"
              th:data-action="@{/api/diagnoses}"
              data-redirect="/diagnoses"
              novalidate>

            <div class="form-grid form-grid--2">
                <div class="form-field">
                    <label for="code">Code</label>
                    <input id="code" name="code" type="text" maxlength="20" required>
                    <span class="field-error" data-field-error="code"></span>
                </div>

                <div class="form-field">
                    <label for="name">Name</label>
                    <input id="name" name="name" type="text" maxlength="100" required>
                    <span class="field-error" data-field-error="name"></span>
                </div>

                <div class="form-field" style="grid-column:1/-1;">
                    <label for="description">Description</label>
                    <textarea id="description" name="description" placeholder="Optional"></textarea>
                    <span class="field-error" data-field-error="description"></span>
                </div>
            </div>

            <div class="actions-row" style="margin-top:1.25rem;">
                <button type="submit" class="btn btn--primary">Save</button>
            </div>
        </form>
    </div>
</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<th:block th:replace="~{fragments/layout :: scripts}"></th:block>

<script>
    (function () {
        var form = document.getElementById("diagnosis-create-form");
        if (!form || !window.medicalRecordApi) return;

        function clearFieldErrors() {
            form.querySelectorAll("[data-field-error]").forEach(function (el) {
                el.textContent = "";
            });
        }

        window.medicalRecordApi.bindJsonForm(form, function (f) {
            clearFieldErrors();

            var code = f.code.value.trim();
            var name = f.name.value.trim();
            var description = f.description.value.trim();

            if (!code) throw new Error("Code is required.");
            if (!name) throw new Error("Name is required.");

            return {
                code: code,
                name: name,
                description: description || null
            };
        });
    })();
</script>
</body>
</html>
