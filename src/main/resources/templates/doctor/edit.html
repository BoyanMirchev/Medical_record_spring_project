<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <title>Edit doctor · Medical Records</title>
    <th:block th:replace="~{fragments/layout :: head-links}"></th:block>
</head>
<body>
<header th:replace="~{fragments/layout :: header}"></header>

<main class="container">
    <div class="page-header">
        <div>
            <h1>Edit doctor</h1>
            <p>Update profile and specialty.</p>
        </div>
        <a class="btn btn--ghost" th:href="@{/doctors}">Back to list</a>
    </div>

    <div class="card">
        <div class="api-error" data-api-error role="alert"></div>

        <form id="doctor-edit-form"
              data-method="PUT"
              th:data-action="@{/api/doctors/{id}(id=${doctorEditDto.id})}"
              data-redirect="/doctors"
              novalidate>

            <div class="form-grid form-grid--2">
                <div class="form-field">
                    <label for="userId">User account</label>
                    <select id="userId" name="userId" required>
                        <option th:each="u : ${users}"
                                th:value="${u.id}"
                                th:selected="${u.id == doctorEditDto.userId}"
                                th:text="${u.username + ' (' + u.email + ')'}">
                            user
                        </option>
                    </select>
                    <span class="field-error" data-field-error="userId"></span>
                </div>

                <div class="form-field">
                    <label for="specialtyId">Specialty</label>
                    <select id="specialtyId" name="specialtyId" required>
                        <option th:each="s : ${specialties}"
                                th:value="${s.id}"
                                th:selected="${s.id == doctorEditDto.specialtyId}"
                                th:text="${s.name}">
                            spec
                        </option>
                    </select>
                    <span class="field-error" data-field-error="specialtyId"></span>
                </div>

                <div class="form-field">
                    <label for="doctorIdentifier">Doctor identifier</label>
                    <input id="doctorIdentifier"
                           name="doctorIdentifier"
                           type="text"
                           maxlength="50"
                           required
                           th:value="${doctorEditDto.doctorIdentifier}">
                    <span class="field-error" data-field-error="doctorIdentifier"></span>
                </div>

                <div class="form-field">
                    <label for="firstName">First name</label>
                    <input id="firstName"
                           name="firstName"
                           type="text"
                           maxlength="50"
                           required
                           th:value="${doctorEditDto.firstName}">
                    <span class="field-error" data-field-error="firstName"></span>
                </div>

                <div class="form-field">
                    <label for="lastName">Last name</label>
                    <input id="lastName"
                           name="lastName"
                           type="text"
                           maxlength="50"
                           required
                           th:value="${doctorEditDto.lastName}">
                    <span class="field-error" data-field-error="lastName"></span>
                </div>

                <div class="form-field form-check" style="align-self:end;">
                    <input id="canBePersonalDoctor"
                           name="canBePersonalDoctor"
                           type="checkbox"
                           value="true"
                           th:checked="${doctorEditDto.canBePersonalDoctor}">
                    <label for="canBePersonalDoctor">Can be personal (GP) doctor</label>
                </div>
            </div>

            <div class="actions-row" style="margin-top:1.25rem;">
                <button type="submit" class="btn btn--primary">Save changes</button>

                <button sec:authorize="hasRole('ADMIN')"
                        type="button"
                        class="btn btn--danger"
                        id="doctor-delete">
                    Delete
                </button>
            </div>
        </form>
    </div>
</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<th:block th:replace="~{fragments/layout :: scripts}"></th:block>

<script th:inline="javascript">
    (function () {
        var form = document.getElementById("doctor-edit-form");
        var errorBox = document.querySelector("[data-api-error]");

        function clearFieldErrors() {
            if (!form) return;
            form.querySelectorAll("[data-field-error]").forEach(function (el) {
                el.textContent = "";
            });
        }

        if (form && window.medicalRecordApi) {
            window.medicalRecordApi.bindJsonForm(form, function (f) {
                clearFieldErrors();

                var userId = parseInt(f.userId.value, 10);
                var specialtyId = parseInt(f.specialtyId.value, 10);
                var doctorIdentifier = f.doctorIdentifier.value.trim();
                var firstName = f.firstName.value.trim();
                var lastName = f.lastName.value.trim();

                if (!userId) throw new Error("User account is required.");
                if (!specialtyId) throw new Error("Specialty is required.");
                if (!doctorIdentifier) throw new Error("Doctor identifier is required.");
                if (!firstName) throw new Error("First name is required.");
                if (!lastName) throw new Error("Last name is required.");

                return {
                    id: /*[[${doctorEditDto.id}]]*/ 0,
                    userId: userId,
                    specialtyId: specialtyId,
                    doctorIdentifier: doctorIdentifier,
                    firstName: firstName,
                    lastName: lastName,
                    canBePersonalDoctor: f.canBePersonalDoctor.checked
                };
            });
        }

        var del = document.getElementById("doctor-delete");
        if (del && window.medicalRecordApi) {
            del.addEventListener("click", function () {
                if (!confirm("Delete this doctor permanently?")) return;

                var id = /*[[${doctorEditDto.id}]]*/ 0;

                window.medicalRecordApi.request("DELETE", "/api/doctors/" + id, null)
                    .then(function () {
                        window.location.href = "/doctors";
                    })
                    .catch(function (err) {
                        if (errorBox) {
                            errorBox.textContent = window.medicalRecordApi.formatApiError(err.status, err.body);
                            errorBox.style.display = "block";
                        }
                    });
            });
        }
    })();
</script>
</body>
</html>
